<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header>
    <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
    <nav>
      <a href="{{ '/' | relative_url }}#people">People</a>
      <a href="https://github.com/fermiflow" target="_blank">fermiflow</a>
      <a href="https://github.com/QuantumBFS" target="_blank">QuantumBFS</a>
      <a href="https://github.com/TensorBFS" target="_blank">TensorBFS</a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    {{ site.title }} · <a href="https://theory.iphy.ac.cn/" target="_blank">IOP, CAS</a>
  </footer>
</body>
</html>
