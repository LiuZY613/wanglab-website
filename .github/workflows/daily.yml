name: AI Daily Report

on:
  schedule:
    - cron: '0 0 * * *'   # UTC 00:00 = 北京时间 08:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate daily report
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API_ENDPOINT: ${{ secrets.AI_API_ENDPOINT }}
        run: node scripts/daily-report.js

      - name: Commit and push
        run: |
          git config user.name "AI Daily Bot"
          git config user.email "ai-bot@wanglab.cn"
          git add docs/daily/
          git diff --cached --quiet || git commit -m "📰 AI日报 $(date +%Y-%m-%d)"
          git push
